<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitMatch | Dashboards</title>
    <link rel="stylesheet" href="./../css/treinos.css" />
    <script src="../js/sessao.js"></script>
  </head>
  <body>
    <div class="janela">
      <div class="navbar-lateral">
        <div class="logo">
              <img src="../assets/imgs/fitmatch.png" alt="FitMatch Logo" />
            </div>


        <div class="hello">
          <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
        </div>

        <div class="btn-nav">
          <a href="./index.html">
            Dashboard
          </a>
        </div>

        <div class="btn-nav">
          <a class="bt-nav-select" href="./treinos.html">Meus Treinos</a>
        </div>

        <div class="btn-logout" onclick="limparSessao()">
          <h3>Sair</h3>
        </div>
      </div>

      <div class="dash">
        <div class="titulo-pagina">
        <h1>Meus Treinos</h1>
        <p>Seu plano personalizado — Semana atual</p>
      </div>

      <div class="cartao-treino">
        <div class="cabecalho-treino" onclick="abrirTreino('treinoA')">
          <div class="treino-esquerda">
            <div class="letra-treino">A</div>

            <div class="info-treino">
              <h2 id="tituloA">Treino A</h2>
              <p id="qtdA">0 exercícios</p>
            </div>
          </div>
        </div>

        <div class="conteudo-treino" id="treinoA">
          <div class="cabecalho-tabela">
            <span class="titulo-exercicio">EXERCÍCIO</span>
            <span>SÉRIES</span>
            <span>REPETIÇÕES</span>
          </div>

          <div id="listaTreinoA"></div>

          <div class="cardio">
            <p id="cardioA"></p>
            <span>30 min</span>
          </div>
        </div>
      </div>

      <div class="cartao-treino">
        <div class="cabecalho-treino" onclick="abrirTreino('treinoB')">
          <div class="treino-esquerda">
            <div class="letra-treino">B</div>

            <div class="info-treino">
              <h2 id="tituloB">Treino B</h2>
              <p id="qtdB">0 exercícios</p>
            </div>
          </div>
        </div>

        <div class="conteudo-treino" id="treinoB">
          <div class="cabecalho-tabela">
            <span class="titulo-exercicio">EXERCÍCIO</span>
            <span>SÉRIES</span>
            <span>REPETIÇÕES</span>
          </div>

          <div id="listaTreinoB"></div>

          <div class="cardio">
            <p id="cardioB"></p>
            <span>30 min</span>
          </div>
        </div>
      </div>

      <div class="cartao-treino">
        <div class="cabecalho-treino" onclick="abrirTreino('treinoC')">
          <div class="treino-esquerda">
            <div class="letra-treino">C</div>

            <div class="info-treino">
              <h2 id="tituloC">Treino C</h2>
              <p id="qtdC">0 exercícios</p>
            </div>
          </div>
        </div>

        <div class="conteudo-treino" id="treinoC">
          <div class="cabecalho-tabela">
            <span class="titulo-exercicio">EXERCÍCIO</span>
            <span>SÉRIES</span>
            <span>REPETIÇÕES</span>
          </div>

          <div id="listaTreinoC"></div>

          <div class="cardio">
            <p id="cardioC"></p>
            <span>30 min</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    buscarTreinos();

  function buscarTreinos() {
    console.log("ID USUARIO:", sessionStorage.ID_USUARIO);
    
    fetch(`/treinos/buscarTreinos/${sessionStorage.ID_USUARIO}`)
      .then(function (resposta) {
        return resposta.json();
      })
      .then(function (dados) {
        console.log(dados);

        let treinoA = [];
        let treinoB = [];
        let treinoC = [];

        for (let i = 0; i < dados.length; i++) {
          if (dados[i].divisao == "A") {
            treinoA.push(dados[i]);
          } else if (dados[i].divisao == "B") {
            treinoB.push(dados[i]);
          } else if (dados[i].divisao == "C") {
            treinoC.push(dados[i]);
          }
        }

        preencherTreino("A", treinoA);
        preencherTreino("B", treinoB);
        preencherTreino("C", treinoC);
      })

      .catch(function (erro) {
        console.log("Erro:", erro);
      });
  }

  function preencherTreino(letra, treino) {
    if (treino.length == 0) {
      return;
    }

    document.getElementById(`titulo${letra}`).innerHTML =
      `Treino ${letra} — ${treino[0].musculos}`;

    document.getElementById(`qtd${letra}`).innerHTML =
      `${treino.length} exercícios`;

    document.getElementById(`cardio${letra}`).innerHTML =
      `Cardio: ${treino[0].cardio}`;

    let htmlExercicios = "";

    for (let i = 0; i < treino.length; i++) {
      htmlExercicios += `
      <div class="linha-exercicio">
        <p class="titulo-exercicio">${treino[i].exercicio}</p>
        <span>${treino[i].series}</span>
        <span>${treino[i].repeticoes}</span>
      </div>
    `;
    }

    document.getElementById(`listaTreino${letra}`).innerHTML = htmlExercicios;
  }

  function abrirTreino(id) {
    let treino = document.getElementById(id);

    if (treino.style.display == "block") {
      treino.style.display = "none";
    } else {
      treino.style.display = "block";
    }
  }
  
</script>
