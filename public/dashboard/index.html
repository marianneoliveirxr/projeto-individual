<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMatch | Dashboard</title>

    <script src="../js/sessao.js"></script>
</head>

<body onload=" atualizarFeed()">

<body>
<aside>
    <div class="janela">
        <div class="header-left">
            <div class="logo">
              <img src="../assets/img/fitmatch.png" alt="FitMatch Logo" />
            </div>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="links-navbar">
                <a href="index.html">
                    <h3>Dashboard</h3>
                </a>

                <a href="treinos.html">Meus Treinos</a>

                <a href="meuperfil.html">Meu Perfil</a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash">
            <div id="alerta">
            </div>

            <div class="btns-dash" id="btnAquario">
                <!-- O gráfico é chamado de acordo com o id (fk_aquario) do banco  -->
            </div>
            <div id="graficos">
            </div>
        </div>
    </div>
</aside>
<main>
    <div class="titulo-topo">
        <h2>Veja seu progresso e continue evoluindo.</h2>
        <button onclick="window.location.href = 'registro.html'">Registrar Peso Semanal</button>
    </div>

    <div class="kpis-container">
        <div class="card-kpi">
            <div class="topo-kpi">
                <span>PESO ATUAL</span>
            </div>
            <div class="valor-kpi">
                <span id="kpi_peso_valor"></span><span class="complemento">kg</span>
            </div>
            <div class="rodape-kpi">
                <span class="texto-kpi">Faltam <span id="faltaMeta"></span> kg para a sua meta!</span>
            </div>
        </div>

        <div class="card-kpi">
            <div class="topo-kpi">
                <span>IMC ATUAL</span>
            </div>
            <div class="valor-kpi">
                <span id="kpi_imc_valor"></span>
            </div>
            <div class="rodape-kpi">
                <span class="texto-kpi" id="status_imc"></span>
            </div>
        </div>

        <div class="card-kpi">
            <div class="topo-kpi">
                <span>TREINO DO DIA</span>
            </div>
            <div class="valor-kpi">
                <span id="kpi_treinoDia"></span>
            </div>
            <div class="rodape-kpi">
                <span class="texto-kpi">Foco e Determinação!</span>
            </div>
        </div>
    </div>

    <div class="graficos-container">
  <div class="grafico-header">
    <span>EVOLUÇÃO DO PESO</span>
  </div>

  <canvas id="graficoPeso"></canvas>
</div>

<div class="graficos-container">
  <div class="grafico-header">
    <span>EVOLUÇÃO DO IMC</span>
  </div>

  <canvas id="graficoImc"></canvas>
</div>
</main>

</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    const ctxPeso = document.getElementById("graficoPeso").getContext("2d");

new Chart(ctxPeso, {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Peso",
            data: dadosPeso,
            borderColor: "#00BFFF",
            backgroundColor: "#00BFFF",
            tension: 0.3
        }]
    }
});

const ctxImc = document.getElementById("graficoImc").getContext("2d");

new Chart(ctxImc, {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "IMC",
            data: dadosImc,
            borderColor: "#FFD700",
            backgroundColor: "#FFD700",
            tension: 0.3
        }]
    }
});
</script>
