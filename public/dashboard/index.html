<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitMatch | Dashboards</title>
    <link rel="stylesheet" href="./../css/dashboards.css" />
    <script src="../js/sessao.js"></script>
  </head>
  <body onload="carregarDashboard()">
    <div class="janela">
      <div class="navbar-lateral">
        <div class="logo">
          <img src="../assets/imgs/fitmatch.png" alt="FitMatch Logo" />
        </div>

        <div class="hello">
          <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
        </div>

        <div class="btn-nav">
          <a class="bt-nav-select" href="./index.html"> Dashboard </a>
        </div>

        <div class="btn-nav">
          <a href="./treinos.html"> Meus Treinos</a>
        </div>

        <div class="btn-logout" onclick="limparSessao()">
          <h3>Sair</h3>
        </div>
      </div>

      <div class="dash">
        <div class="welcome-header">
          <h2>Veja seu progresso e continue evoluindo.</h2>

          <button onclick="window.location.href = 'registro.html'">
            Registrar Peso Semanal
          </button>
        </div>

        <div class="kpis-container">
          <div class="card-kpi">
            <div class="kpi-header">
              <span>TOTAL DE REGISTROS</span>
            </div>

            <div class="kpi-value">
              <span id="kpi_totalRegistros"></span>
            </div>

            <div class="kpi-footer">
              <span>Pesagens cadastradas</span>
            </div>
          </div>

          <div class="card-kpi">
            <div class="kpi-header">
              <span>META DE PESO</span>
            </div>

            <div class="kpi-value">
              <span id="kpi_meta"></span>
              <small>kg</small>
            </div>

            <div class="kpi-footer">
              <span id="texto_meta"></span>
            </div>
          </div>

          <div class="card-kpi">
            <div class="kpi-header">
              <span>SEU IMC ATUAL</span>
            </div>

            <div class="kpi-value">
              <span id="kpi_imc_valor"></span>
            </div>

            <div class="kpi-footer">
              <span id="texto_imc"></span>
            </div>
          </div>
        </div>

        <div class="charts-container">
          <div class="chart-box">
            <div class="chart-header">
              <span>EVOLUÇÃO</span>
              <h3>IMC ao longo do tempo</h3>
            </div>

            <canvas id="graficoIMC"></canvas>
          </div>

          <div class="chart-box">
            <div class="chart-header">
              <span>COMPARAÇÃO</span>
              <h3>Peso Atual x Meta</h3>
            </div>

            <canvas id="graficoMeta"></canvas>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

  function carregarDashboard() {
    carregarGraficos();
    carregarDadosKPIs();
  }

  function carregarDadosKPIs() {
    // KPI DE TOTAL DE REGISTROS
    fetch(`/dash/buscarTotaldeRegistros/${sessionStorage.ID_USUARIO}`)
      .then(function (resposta) {
        return resposta.json();
      })
      .then(function (dados) {
        console.log(dados);

        kpi_totalRegistros.innerText = dados[0].totalRegistros;
      });

    //KPI IMC ATUAL
    fetch(`/dash/buscarIMCAtual/${sessionStorage.ID_USUARIO}`)
      .then(function (resposta) {
        return resposta.json();
      })
      .then(function (dados) {
        console.log(dados);

        let imc = dados[0].imc
        kpi_imc_valor.innerText = imc;

        if (imc < 18.5) {
          texto_imc.innerHTML = `Abaixo do Peso - Foque em ganho de massa muscular`;
        } else if (imc < 24.9) {
          texto_imc.innerHTML = `Peso Ideal - Continue assim!`;
        } else if (imc < 29.9) {
          texto_imc.innerHTML = `Sobrepeso — continue focada no treino!`;
        } else if (imc > 29.9) {
          texto_imc.innerHTML = `Obesidade — continue focada no treino!`;
        }
      });
  }

  function carregarGraficos() {
    fetch(`/dash/buscarGraficoIMC/${sessionStorage.ID_USUARIO}`)
      .then(function (resposta) {
        return resposta.json();
      })

      .then(function (dados) {
        console.log(dados);

        let labels = [];
        let dadosIMC = [];

        for (let i = 0; i < dados.length; i++) {
          labels.push(dados[i].dtRegistro);
          dadosIMC.push(dados[i].imc);

          console.log(labels);
          console.log(dadosIMC);
        }

        //GRÁFICO IMC
        const graficoIMC = document.getElementById("graficoIMC");

        new Chart(graficoIMC, {
          type: "line",

          data: {
            labels: labels,
            datasets: [
              {
                label: "IMC",
                data: dadosIMC,
                borderColor: "#00BFFF",
                backgroundColor: "#00BFFF",
              },
            ],
          },
        });
      });

    fetch(`/dash/buscarGraficoMeta/${sessionStorage.ID_USUARIO}`)
      .then(function (resposta) {
        return resposta.json();
      })

      .then(function (dados) {
        console.log(dados);

        let pesoAtual = dados[0].pesoAtual;
        let pesoMeta = dados[0].pesoMeta;

        // KPI DA META DE PESO
        if (pesoAtual > pesoMeta) {
          kpi_meta.innerHTML = `Faltam ${pesoAtual - pesoMeta}`;
          texto_meta.innerHTML = "Continue firme!";
        } else if (pesoAtual == pesoMeta) {
          kpi_meta.innerHTML = "Meta atingida!";
          texto_meta.innerHTML = "Parabéns!";
        } else {
          kpi_meta.innerHTML = `Faltam ${pesoMeta - pesoAtual}`;
          texto_meta.innerHTML = "Excelente resultado!";
        }

        // GRÁFICO DA META DE PESO
        const graficoIMC = document.getElementById("graficoMeta");

        new Chart(graficoIMC, {
          type: "bar",

          data: {
            labels: ["Peso Atual", "Meta de Peso"],
            datasets: [
              {
                label: "Peso(kg)",
                data: [pesoAtual, pesoMeta],
                backgroundColor: ["#00BFFF", "#ffc107"],
              },
            ],
          },
        });
      });
  }
</script>
