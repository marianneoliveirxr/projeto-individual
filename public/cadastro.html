<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FitMatch | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body onload="listar()">
  <!--header inicio-->
  <div class="header">
    <div class="container">
      <h1 class="titulo">FitMatch</h1>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Nome Completo</span>
            <input id="ipt_nome" type="text" placeholder="Seu nome" />
            <div id="erroNome" class="erro"></div>
          </div>
          <div class="campo">
            <span>Data de Nascimento</span>
            <input id="ipt_data" type="date"/>
            <div id="erroData" class="erro"></div>
          </div>
          <div class="campo">
            <span>E-mail</span>
            <input id="ipt_email" type="text" placeholder="meuemail@provedor.com" />
            <div id="erroEmail" class="erro"></div>
          </div>
          <div class="campo">
            <span>Senha</span>
            <input id="ipt_senha" type="password" placeholder="******" />
            <div id="erroSenha" class="erro"></div>
          </div>
          <div class="campo">
            <span>Confirmação da Senha</span>
            <input id="ipt_confirmacao" type="password" placeholder="******" />
            <div id="erroConfirmar" class="erro"></div>
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <div id="mensagem_aguardar"></div>
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!--footer inicio-->
  <div class="footer">
    <div class="container">
      <h4>Feito com amor por Marianne &hearts; SPTech &copy; 2026</h4>
    </div>
  </div>
  <!--footer fim-->
</body>

</html>

<script>

  function cadastrar() {
    aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = ipt_nome.value;
    var emailVar = ipt_email.value;
    var dataVar = ipt_data.value;
    var senhaVar = ipt_senha.value;
    var confirmacaoSenhaVar = ipt_confirmacao.value;

    erroNome.innerHTML = "";
    erroData.innerHTML = "";
    erroEmail.innerHTML = "";
    erroSenha.innerHTML = "";
    erroConfirmar.innerHTML = "";


    let valido = false;

    let partesData = dtNasc.split("-");
    let ano = partesData[0];
    let mes = partesData[1];
    let dia = partesData[2];

    //Se todos os campos estiverem em branco
    if(
      nomeVar == "" &&
      emailVar == "" &&
      dataVar == "" &&
      senhaVar == "" &&
      confirmacaoSenhaVar == ""
    ){
      erroConfirmar.innerHTML =
      "Preencha todos os campos";

      finalizarAguardar();
    }
    //Nome com mais de 3 caracteres
   else if(nomeVar.length < 3){
      erroNome.innerHTML =
      "Nome inválido";

      finalizarAguardar();
    }
    //Validação de email
    else if(!emailVar.includes("@") || !emailVar.includes(".com")){
      //divide o email pelo @ e valida a primeira e a segunda parte
      let partes = emailVar.split("@");

      if(partes[0].length < 3){
        erroEmail.innerHTML =
        "Poucos caracteres antes do @";
      }

      if(partes[1].length < 4){
        erroEmail.innerHTML =
        "Domínio inválido";

        finalizarAguardar();
      }
    }
    else if(dia > 31 || mes > 12 || ano > 2012){
      erroData.innerHTML = "É necessário possuir mais de 14 anos"
    }
    else if(senhaVar.length < 6){
      erroSenha.innerHTML = "A senha deve conter mais de 6 caracteres";
    }
    else if(
      !senhaVar.includes("!") ||
      !senhaVar.includes("@") ||
      !senhaVar.includes("#") ||
      !senhaVar.includes("$")){
        erroSenha.innerHTML = "A senha precisa conter um caracter especial (! # $ @)";
    }
    else if(senhaVar != confirmacaoSenhaVar){
      erroConfirmar.innerHTML = "Senhas não coincidem";
    }
    else {
      valido = true;
      setInterval(sumirMensagem, 5000);
    }

    if(valido){
                //Recupere o valor da nova input pelo nome do id
                // Agora vá para o método fetch logo abaixo

                // Enviando o valor da nova input
                fetch("/usuarios/cadastrar", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        nomeServer: nomeVar,
                        emailServer: emailVar,
                        senhaServer: senhaVar
                    })
                })
                    .then(function (resposta) {
                        console.log("resposta: ", resposta);

                        if (resposta.ok) {
                            setTimeout(function () {
                                 mensagem_aguardar.innerHTML = 'Cadastro realizado! <br> Vamos criar seu plano!'
                                login(emailVar, senhaVar);
                            }, 1000);

                            limparFormulario();

                        } else {
                            throw ("Erro no cadastro");
                        }
                    })
                    .catch(function (erro) {
                        console.log(erro);
                    });

                // return false;
            }
    }


   function login(emailVar, senhaVar){
    console.log("FORM LOGIN: ", emailVar);
      console.log("FORM SENHA: ", senhaVar);

      fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          emailServer: emailVar,
          senhaServer: senhaVar,
        }),
      })
        .then(function (resposta) {
          console.log("ESTOU NO THEN DO entrar()!");

          if (resposta.ok) {
            console.log(resposta);

            resposta.json().then((json) => {
              console.log(json);
              console.log(JSON.stringify(json));
              sessionStorage.EMAIL_USUARIO = json.email;
              sessionStorage.NOME_USUARIO = json.nome;
              sessionStorage.ID_USUARIO = json.id;
            });

            // limparFormulario();
            setTimeout(function () {
              window.location.href = "plano.html";
            }, 3000);
          } else {
            console.log("Houve um erro ao tentar realizar o login!");

            resposta.text().then((texto) => {
              console.error(texto);
              finalizarAguardar(texto);
            });
          }
        })
        .catch(function (erro) {
          console.log(erro);
        });

      return false;
    }
</script>
