<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FitMatch | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/cadastro.css" />
</head>

<body>
  <!--header inicio-->
  <div class="header">
      <div class="navbar">
        <div class="logosite">
          <img src="assets/imgs/fitmatch.png" alt="Fit Match" />
        </div>
        <ul class="links-navbar">
          <li class="agora">
            <a href="#">Inicial</a>
          </li>
          <li>
            <a href="#imc">Calcular IMC</a>
          </li>
          <li>|</li>
          <li>
            <a href="login.html">Entrar</a>
          </li>
          <li>
            <a href="cadastro.html" class="botao-cadastro">Cadastre-se</a>
          </li>
        </ul>
      </div>
    </div>
  <!--header fim-->

  <div class="login">
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Nome Completo</span>
            <input id="ipt_nome" type="text" placeholder="Seu nome" />
            <div id="erroNome" class="erro"></div>
          </div>
          <div class="campo">
            <span>Data de Nascimento</span>
            <input id="ipt_data" type="date"/>
            <div id="erroData" class="erro"></div>
          </div>
          <div class="campo">
            <span>E-mail</span>
            <input id="ipt_email" type="text" placeholder="meuemail@provedor.com" />
            <div id="erroEmail" class="erro"></div>
          </div>
          <div class="campo">
            <span>Senha</span>
            <input id="ipt_senha" type="password" placeholder="******" />
            <div id="erroSenha" class="erro"></div>
          </div>
          <div class="campo">
            <span>Confirmação da Senha</span>
            <input id="ipt_confirmar" type="password" placeholder="******" />
            <div id="erroConfirmar" class="erro"></div>
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
          <p>Já possui uma conta? <a href="login.html">Entrar</a></p>
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!--footer inicio-->
  <div class="footer">
    <div class="container">
      <h4>Feito com amor por Marianne &hearts; SPTech &copy; 2026</h4>
    </div>
  </div>
  <!--footer fim-->
</body>

</html>

<script>
  function limparFormulario(){
        ipt_nome.innerHTML = "";
        ipt_data.innerHTML = "";
        ipt_email.innerHTML = "";
        ipt_senha.innerHTML = "";
        ipt_confirmar.innerHTML = "";
    }
    function cadastrar() {

        var nomeVar = ipt_nome.value;
        var dataVar = ipt_data.value;
        var emailVar = ipt_email.value.trim();
        var senhaVar = ipt_senha.value;
        var confirmarVar = ipt_confirmar.value;

        let valido = true;

        erroNome.innerHTML = "";
        erroData.innerHTML = "";
        erroEmail.innerHTML = "";
        erroSenha.innerHTML = "";
        erroConfirmar.innerHTML = "";

        if (nomeVar.length < 3) {
            erroNome.innerText = "Digite um nome válido";
            valido = false;
        }


        if (!emailVar.includes("@") || !emailVar.includes(".com")) {
            erroEmail.innerText = "Email inválido";
            valido = false;
        } else {
            let partes = emailVar.split("@");

            if (partes[0].length < 3) {
                erroEmail.innerHTML = "Poucos caracteres antes do @";
                valido = false;
            }

            if (partes[1].length < 4) {
                erroEmail.innerHTML = "Domínio inválido";
                valido = false;
            }
        }

        if (dataVar == "") {
            erroData.innerText = "Informe a data";
            valido = false;
        } else {
            let partes = dataVar.split("-");
            let ano = partes[0];
            let mes = partes[1];
            let dia = partes[2];

            if (dia > 31 || mes > 12 || ano > 2026) {
                erroData.innerHTML = "Data inválida";
                valido = false;
            }
            else if (dia > 31 || mes > 12 || ano > 2012) {
                erroData.innerHTML = "Você precisa ter mais de 14 anos";
                valido = false;
            }
            else if (dia > 29 && mes == 2) {
                erroData.innerHTML = "Data inválida";
                valido = false;
            }

            if (senhaVar.length < 4) {
                erroSenha.innerHTML = "Senha muito curta";
                valido = false;
            }
            else if (!senhaVar.includes("!") && !senhaVar.includes("@") && !senhaVar.includes("#") && !senhaVar.includes("$")) {
                erroSenha.innerHTML = "Use um caractere especial (! @ # $)";
                valido = false;
            }

            else if (senhaVar != confirmarVar) {
                erroConfirmar.innerHTML = "Senhas não coincidem";
                valido = false;
            }

            if (valido) {
                //Recupere o valor da nova input pelo nome do id
                // Agora vá para o método fetch logo abaixo

                // Enviando o valor da nova input
                fetch("/usuarios/cadastrar", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        nomeServer: nomeVar,
                        emailServer: emailVar,
                        senhaServer: senhaVar
                    })
                })
                    .then(function (resposta) {
                        console.log("resposta: ", resposta);

                        if (resposta.ok) {
                            setTimeout(function () {
                                 mensagem_aguardar.innerHTML = 'Cadastro realizado! <br> Vamos criar seu plano!'
                                login(emailVar, senhaVar);
                            }, 1000);

                            limparFormulario();

                        } else {
                            throw ("Erro no cadastro");
                        }
                    })
                    .catch(function (erro) {
                        console.log(erro);
                    });

                // return false;
            }
        }
    }

    function login(emailVar, senhaVar){
    console.log("FORM LOGIN: ", emailVar);
      console.log("FORM SENHA: ", senhaVar);

      fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          emailServer: emailVar,
          senhaServer: senhaVar,
        }),
      })
        .then(function (resposta) {
          console.log("ESTOU NO THEN DO entrar()!");

          if (resposta.ok) {
            console.log(resposta);

            resposta.json().then((json) => {
              console.log(json);
              console.log(JSON.stringify(json));
              sessionStorage.EMAIL_USUARIO = json.email;
              sessionStorage.NOME_USUARIO = json.nome;
              sessionStorage.ID_USUARIO = json.id;
            });

            // limparFormulario();
            setTimeout(function () {
              window.location.href = "plano.html";
            }, 3000);
          } else {
            console.log("Houve um erro ao tentar realizar o login!");

            resposta.text().then((texto) => {
              console.error(texto);
              finalizarAguardar(texto);
            });
          }
        })
        .catch(function (erro) {
          console.log(erro);
        });

      return false;
    }
</script>
