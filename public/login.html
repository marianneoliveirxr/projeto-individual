<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FitMatch | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/formulario.css" />
  </head>

  <body>
    <div class="login">
      <div class="container">
        <div class="logo">
            <img src="assets/imgs/fitmatch.png" alt="FitMatch Logo" />
            <p>FEITO PARA A SUA EVOLUÇÃO</p>
          </div>

        <div class="card">
          <div class="formulario">
            <div class="campo">
              <span>E-mail:</span>
              <input
                id="email_input"
                type="text"
                placeholder="seuemail@exemplo.com"
              />
              <div id="erroEmail" class="erro"></div>
            </div>

            <div class="campo">
              <span>Senha:</span>
              <input id="senha_input" type="password" placeholder="*********" />
              <div id="erroSenha" class="erro"></div>
            </div>

            <button class="botao" onclick="entrar()">Entrar</button>
          </div>
          <p class="rodape-formulario">
            Ainda não possui uma conta?
            <a href="cadastro.html">Cadastre-se</a>
          </p>
          <p class="rodape-formulario"><a href="index.html">Voltar para o início</a></p>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  function entrar() {
    let valido = true;

    var emailVar = email_input.value.trim();
    var senhaVar = senha_input.value.trim();

    erroEmail.innerHTML = "";
    erroSenha.innerHTML = "";

    if (!emailVar.includes("@") || !emailVar.includes(".com")) {
      erroEmail.innerHTML = "Email inválido";
      valido = false;
    } else {
      let partes = emailVar.split("@");

      if (partes[0].length < 3) {
        erroEmail.innerHTML = "Poucos caracteres antes do @";
        valido = false;
      }

      if (partes[1].length < 4) {
        erroEmail.innerHTML = "Domínio inválido";
        valido = false;
      }
    }

    if (senhaVar.length < 4) {
      erroSenha.innerHTML = "Senha inválida";
      valido = false;
    } else if (
      !senhaVar.includes("!") &&
      !senhaVar.includes("@") &&
      !senhaVar.includes("#") &&
      !senhaVar.includes("$")
    ) {
      erroSenha.innerHTML = "Senha inválida";
      valido = false;
    }

    if (valido) {
      console.log("FORM LOGIN: ", emailVar);
      console.log("FORM SENHA: ", senhaVar);

      fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          usuarioServer: sessionStorage.ID_USUARIO,
          emailServer: emailVar,
          senhaServer: senhaVar,
        }),
      })
        .then(function (resposta) {
          console.log("ESTOU NO THEN DO entrar()!");

          if (resposta.ok) {
            console.log(resposta);

            resposta.json().then((json) => {
              console.log(json);
              console.log(JSON.stringify(json));
              sessionStorage.EMAIL_USUARIO = json.email;
              sessionStorage.NOME_USUARIO = json.nome;
              sessionStorage.ID_USUARIO = json.id;
            });

            // limparFormulario();

            setTimeout(function () {
              window.location.href = "/dashboard/";
            }, 1000);
          } else {
            console.log("Houve um erro ao tentar realizar o login!");

            resposta.text().then((texto) => {
              console.error(texto);
              finalizarAguardar(texto);
            });
          }
        })
        .catch(function (erro) {
          console.log(erro);
        });

      return false;
    }
  }
</script>
