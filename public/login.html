    <!--Header-->

                    <div class="campo">

<script>
function entrar() {
    let valido = true;

    var emailVar = email_input.value.trim();
    var senhaVar = senha_input.value.trim();

    erroEmail.innerHTML = "";
    erroSenha.innerHTML = "";

    if (!emailVar.includes("@") || !emailVar.includes(".com")) {
      erroEmail.innerHTML = "Email inválido";
      valido = false;
    } else {
      let partes = emailVar.split("@");

      if (partes[0].length < 3) {
        erroEmail.innerHTML = "Poucos caracteres antes do @";
        valido = false;
      }

      if (partes[1].length < 4) {
        erroEmail.innerHTML = "Domínio inválido";
        valido = false;
      }
    }

    if (senhaVar.length < 4) {
                erroSenha.innerHTML = "Senha inválida";
                valido = false;
    }
    else if (!senhaVar.includes("!") && !senhaVar.includes("@") && !senhaVar.includes("#") && !senhaVar.includes("$")) {
                erroSenha.innerHTML = "Senha inválida";
                valido = false;
    }

    if (valido) {
      console.log("FORM LOGIN: ", emailVar);
      console.log("FORM SENHA: ", senhaVar);

      fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          usuarioServer: sessionStorage.ID_USUARIO,
          emailServer: emailVar,
          senhaServer: senhaVar,
        }),
      })
        .then(function (resposta) {
          console.log("ESTOU NO THEN DO entrar()!");

          if (resposta.ok) {
            console.log(resposta);

            resposta.json().then((json) => {
              console.log(json);
              console.log(JSON.stringify(json));
              sessionStorage.EMAIL_USUARIO = json.email;
              sessionStorage.NOME_USUARIO = json.nome;
              sessionStorage.ID_USUARIO = json.id;
            });

            // limparFormulario();

            setTimeout(function () {
              window.location.href = "/dashboard/";
            }, 1000);
          } else {
            console.log("Houve um erro ao tentar realizar o login!");

            resposta.text().then((texto) => {
              console.error(texto);
              finalizarAguardar(texto);
            });
          }
        })
        .catch(function (erro) {
          console.log(erro);
        });

      return false;
    }
  }

</script>
